<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Frame Wi-Fi Setup</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #f3f7ff 0%, #e8fff2 100%);
      color: #1f2937;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }
    button {
      margin-top: 18px;
      border: 0;
      background: #0f766e;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    .note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Set Up Wi-Fi</h1>
    <p>Choose your network and enter its password. The photo frame will reboot after a successful connection.</p>

    <form action="/save" method="post">
      <label for="ssid">Network (SSID)</label>
      <select id="ssid" name="ssid">
        {% for item in ssids %}
          <option value="{{ item }}">{{ item }}</option>
        {% endfor %}
      </select>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="8" required>

      <label for="country">Country Code (2 letters)</label>
      <input id="country" name="country" type="text" value="US" maxlength="2" pattern="[A-Za-z]{2}">

      <button type="submit">Save and Connect</button>
    </form>

    <div class="note">If your network is hidden, type it manually in the browser URL bar as query support is not included in this basic page.</div>
  </main>
</body>
</html>
